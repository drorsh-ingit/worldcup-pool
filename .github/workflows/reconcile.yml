name: Reconcile tournament

# Pings the secured reconcile endpoint so match results, knockout fixtures, standings
# and bet resolution populate automatically — Vercel's free tier only allows daily cron,
# so we drive it from GitHub Actions instead.
#
# Requirements:
#   - secret  CRON_SECRET : must match the CRON_SECRET set in the Vercel project env
#   - var     APP_URL     : deployed base URL (falls back to the production URL below)
#
# IMPORTANT — actual cadence: the cron below requests */10, but GitHub does NOT honor that
# for scheduled workflows. High-frequency schedules are heavily throttled and best-effort:
# observed runs land roughly once an hour (gaps of 1–3+ hours) and can be skipped under load.
# So real freshness is "within a couple of hours", not 10 minutes. Trigger manually from the
# Actions tab (workflow_dispatch) if you need an immediate reconcile.
# Schedules also only run from the default branch, and auto-disable after 60 days of repo
# inactivity (re-enable from the Actions tab if that happens).

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

concurrency:
  group: reconcile
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Hit reconcile endpoint
        env:
          APP_URL: ${{ vars.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          BASE="${APP_URL:-https://worldcup-pool-three.vercel.app}"
          echo "Reconciling via ${BASE}/api/cron/reconcile"
          code=$(curl -sS -m 55 -o /tmp/reconcile.json -w "%{http_code}" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${BASE}/api/cron/reconcile")
          echo "HTTP ${code}"
          cat /tmp/reconcile.json 2>/dev/null || true
          echo
          test "$code" = "200"
