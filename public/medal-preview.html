<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medal Options</title>
<style>
  body { font-family: Inter, system-ui, sans-serif; background: #fafafa; padding: 40px; color: #111; }
  h2 { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: #888; margin: 0 0 16px; }
  .section { margin-bottom: 48px; }
  .row { display: flex; align-items: center; gap: 24px; margin-bottom: 12px; }
  .label { font-size: 12px; color: #aaa; width: 60px; }
  .medals { display: flex; gap: 16px; align-items: center; }
  /* Fake standings row for context */
  .standing-row { display: flex; align-items: center; gap: 12px; background: white; border-radius: 12px; padding: 12px 20px; border: 1px solid #e5e5e5; width: 360px; }
  .player { font-size: 14px; font-weight: 500; flex: 1; }
  .pts { font-size: 14px; font-weight: 700; color: #111; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: #8b5cf6; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: white; }
</style>
</head>
<body>

<h1 style="font-size:24px;font-weight:900;margin:0 0 32px">Medal Designs</h1>

<!-- ─── Style A: Classic ribbon medal ─── -->
<div class="section">
  <h2>Style A — Classic Ribbon</h2>
  <div class="medals">
    <!-- Gold -->
    <svg width="36" height="48" viewBox="0 0 36 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M10 0 L14 12 H22 L26 0 L18 5 Z" fill="#f59e0b"/>
      <circle cx="18" cy="30" r="14" fill="#fbbf24"/>
      <circle cx="18" cy="30" r="11" fill="#f59e0b"/>
      <circle cx="18" cy="30" r="9" fill="#fcd34d"/>
      <text x="18" y="35" text-anchor="middle" font-size="13" font-weight="800" fill="#92400e">1</text>
    </svg>
    <!-- Silver -->
    <svg width="36" height="48" viewBox="0 0 36 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M10 0 L14 12 H22 L26 0 L18 5 Z" fill="#9ca3af"/>
      <circle cx="18" cy="30" r="14" fill="#d1d5db"/>
      <circle cx="18" cy="30" r="11" fill="#9ca3af"/>
      <circle cx="18" cy="30" r="9" fill="#e5e7eb"/>
      <text x="18" y="35" text-anchor="middle" font-size="13" font-weight="800" fill="#374151">2</text>
    </svg>
    <!-- Bronze -->
    <svg width="36" height="48" viewBox="0 0 36 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M10 0 L14 12 H22 L26 0 L18 5 Z" fill="#b45309"/>
      <circle cx="18" cy="30" r="14" fill="#d97706"/>
      <circle cx="18" cy="30" r="11" fill="#b45309"/>
      <circle cx="18" cy="30" r="9" fill="#fbbf24"/>
      <text x="18" y="35" text-anchor="middle" font-size="13" font-weight="800" fill="#78350f">3</text>
    </svg>
  </div>
  <!-- In context -->
  <div style="margin-top:20px;display:flex;flex-direction:column;gap:8px">
    <div class="standing-row">
      <svg width="36" height="48" viewBox="0 0 36 48"><path d="M10 0 L14 12 H22 L26 0 L18 5 Z" fill="#f59e0b"/><circle cx="18" cy="30" r="14" fill="#fbbf24"/><circle cx="18" cy="30" r="11" fill="#f59e0b"/><circle cx="18" cy="30" r="9" fill="#fcd34d"/><text x="18" y="35" text-anchor="middle" font-size="13" font-weight="800" fill="#92400e">1</text></svg>
      <div class="avatar">DS</div><div class="player">Dror Shemesh</div><div class="pts">77.8</div>
    </div>
    <div class="standing-row">
      <svg width="36" height="48" viewBox="0 0 36 48"><path d="M10 0 L14 12 H22 L26 0 L18 5 Z" fill="#9ca3af"/><circle cx="18" cy="30" r="14" fill="#d1d5db"/><circle cx="18" cy="30" r="11" fill="#9ca3af"/><circle cx="18" cy="30" r="9" fill="#e5e7eb"/><text x="18" y="35" text-anchor="middle" font-size="13" font-weight="800" fill="#374151">2</text></svg>
      <div class="avatar" style="background:#10b981">AK</div><div class="player">Alon K</div><div class="pts">71.2</div>
    </div>
    <div class="standing-row">
      <svg width="36" height="48" viewBox="0 0 36 48"><path d="M10 0 L14 12 H22 L26 0 L18 5 Z" fill="#b45309"/><circle cx="18" cy="30" r="14" fill="#d97706"/><circle cx="18" cy="30" r="11" fill="#b45309"/><circle cx="18" cy="30" r="9" fill="#fbbf24"/><text x="18" y="35" text-anchor="middle" font-size="13" font-weight="800" fill="#78350f">3</text></svg>
      <div class="avatar" style="background:#3b82f6">NB</div><div class="player">Noga B</div><div class="pts">64.5</div>
    </div>
  </div>
</div>
