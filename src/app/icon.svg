<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Green rounded square background -->
  <rect width="32" height="32" rx="7" fill="#4a8c2a"/>
  <!-- Pitch outline -->
  <rect x="4" y="6" width="24" height="20" rx="1" stroke="white" stroke-width="1.5" fill="none"/>
  <!-- Halfway line -->
  <line x1="16" y1="6" x2="16" y2="26" stroke="white" stroke-width="1.2"/>
  <!-- Centre circle -->
  <circle cx="16" cy="16" r="4" stroke="white" stroke-width="1.2" fill="none"/>
  <!-- Centre dot -->
  <circle cx="16" cy="16" r="1" fill="white"/>
  <!-- Left penalty box -->
  <rect x="4" y="10" width="5" height="12" stroke="white" stroke-width="1.2" fill="none"/>
  <!-- Right penalty box -->
  <rect x="23" y="10" width="5" height="12" stroke="white" stroke-width="1.2" fill="none"/>
</svg>
